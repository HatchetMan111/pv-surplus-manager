blueprint:
  name: "PV Surplus Manager (Überschussmanager)"
  description: >
    🌞 **PV Überschussmanager** – Steuert Verbraucher intelligent nach verfügbarem PV-Überschuss.

    **Features:**
    - Bis zu 6 Verbraucher (deaktivierte Verbraucher benötigen KEINEN Schalter)
    - Zeitabhängige SoC-Schwellen pro Verbraucher (Morgens/Mittags/Nachmittags)
    - Zeitabhängige Batterie-Priorisierungsschwelle
    - Tägliche Prioritätsrotation via input_select
    - Batterieerhaltung: voll bis Sonnenuntergang
    - PV-Forecast-Integration (Solcast, Forecast.Solar)
    - Kein Netzbezug für gesteuerte Verbraucher
    - Hysteres-Schwellen gegen häufiges Ein-/Ausschalten

    **Anleitung:** https://github.com/YOUR_GITHUB/pv-surplus-manager
  domain: automation
  author: "PV Surplus Manager"
  homeassistant:
    min_version: "2023.6.0"
  source_url: https://github.com/YOUR_GITHUB/pv-surplus-manager/blob/main/blueprints/pv_surplus_manager.yaml

  input:

    # ─────────────────────────────────────────────────
    # ABSCHNITT 1: PV & Batterie Sensoren
    # ─────────────────────────────────────────────────
    section_pv:
      name: "⚡ PV & Batterie Sensoren"
      icon: mdi:solar-panel-large
      collapsed: false
      input:
        pv_power_sensor:
          name: "PV Erzeugungsleistung (W)"
          description: "Sensor der aktuellen PV-Leistung in Watt."
          selector:
            entity:
              domain: sensor

        grid_power_sensor:
          name: "Netzbezugs-/Einspeisung-Sensor (W)"
          description: "Positiv = Bezug aus Netz, Negativ = Einspeisung."
          selector:
            entity:
              domain: sensor

        battery_soc_sensor:
          name: "Batterie Ladestand (SoC %)"
          description: "Sensor des Batterie-Ladestands in Prozent (0-100)."
          selector:
            entity:
              domain: sensor

        battery_power_sensor:
          name: "Batterie Lade-/Entladeleistung (W)"
          description: "Positiv = Laden, Negativ = Entladen."
          selector:
            entity:
              domain: sensor

        house_consumption_sensor:
          name: "Hausverbrauch (W)"
          description: "Aktueller Gesamtverbrauch des Hauses in Watt."
          selector:
            entity:
              domain: sensor

    # ─────────────────────────────────────────────────
    # ABSCHNITT 2: PV Forecast & Batterie-Ziel
    # ─────────────────────────────────────────────────
    section_forecast:
      name: "☀️ PV Forecast & Batterie-Ziel"
      icon: mdi:weather-sunny
      collapsed: true
      input:
        pv_forecast_today:
          name: "PV Forecast heute (kWh)"
          description: >
            Vorhergesagte Erzeugung heute.
            Solcast: sensor.solcast_pv_forecast_prognose_heute
          selector:
            entity:
              domain: sensor

        pv_forecast_remaining:
          name: "PV Forecast verbleibend (kWh) - optional"
          description: "Noch verbleibende Erzeugung. Leer lassen = Forecast heute wird verwendet."
          default: ""
          selector:
            text:

        battery_capacity_kwh:
          name: "Batteriekapazitat (kWh)"
          description: "Nutzbare Kapazitat der Hausbatterie in kWh."
          default: 10
          selector:
            number:
              min: 1
              max: 100
              step: 0.5
              unit_of_measurement: "kWh"
              mode: box

        battery_target_soc:
          name: "Ziel-SoC am Ende des PV-Tages (%)"
          description: "Die Batterie soll bis Sonnenuntergang auf diesen Ladestand geladen sein."
          default: 95
          selector:
            number:
              min: 50
              max: 100
              step: 5
              unit_of_measurement: "%"
              mode: slider

        sunset_buffer_minutes:
          name: "Puffer vor Sonnenuntergang (Minuten)"
          description: "Wie viele Minuten vor Sonnenuntergang die Batterie voll sein soll."
          default: 90
          selector:
            number:
              min: 0
              max: 240
              step: 15
              unit_of_measurement: "min"
              mode: slider

    # ─────────────────────────────────────────────────
    # ABSCHNITT 3: Batterie Priorisierung (zeitabhangig)
    # ─────────────────────────────────────────────────
    section_battery_prio:
      name: "🔋 Batterie-Priorisierung (zeitabhangig)"
      icon: mdi:battery-clock
      collapsed: true
      input:
        battery_prio_morning_hour:
          name: "Morgen-Zone: Start-Uhrzeit"
          description: "Ab dieser Uhrzeit gilt die Morgen-Schwelle (z.B. 06:00)."
          default: "06:00:00"
          selector:
            time:

        battery_prio_morning_soc:
          name: "Batterie-Priorisierung Morgens (%)"
          description: >
            Unter diesem SoC bekommt die Batterie morgens Vorrang.
            Empfehlung: 80% (Batterie soll tagsüber geladen werden).
          default: 80
          selector:
            number:
              min: 0
              max: 100
              step: 5
              unit_of_measurement: "%"
              mode: slider

        battery_prio_noon_hour:
          name: "Mittag-Zone: Start-Uhrzeit"
          description: "Ab dieser Uhrzeit gilt die Mittag-Schwelle (z.B. 10:00)."
          default: "10:00:00"
          selector:
            time:

        battery_prio_noon_soc:
          name: "Batterie-Priorisierung Mittags (%)"
          description: >
            Unter diesem SoC bekommt die Batterie mittags Vorrang.
            Empfehlung: 20% (PV voll aktiv, Verbraucher können laufen).
          default: 20
          selector:
            number:
              min: 0
              max: 100
              step: 5
              unit_of_measurement: "%"
              mode: slider

        battery_prio_afternoon_hour:
          name: "Nachmittag-Zone: Start-Uhrzeit"
          description: "Ab dieser Uhrzeit gilt die Nachmittag-Schwelle (z.B. 15:00)."
          default: "15:00:00"
          selector:
            time:

        battery_prio_afternoon_soc:
          name: "Batterie-Priorisierung Nachmittags (%)"
          description: >
            Unter diesem SoC bekommt die Batterie nachmittags Vorrang.
            Empfehlung: 70% (Batterie für Abend auffüllen).
          default: 70
          selector:
            number:
              min: 0
              max: 100
              step: 5
              unit_of_measurement: "%"
              mode: slider

        battery_reserve_emergency:
          name: "Notfall-SoC Schwelle (%)"
          description: "Unter diesem Wert werden ALLE Verbraucher sofort ausgeschaltet."
          default: 10
          selector:
            number:
              min: 0
              max: 50
              step: 5
              unit_of_measurement: "%"
              mode: slider

    # ─────────────────────────────────────────────────
    # ABSCHNITT 4: Prioritatssteuerung
    # ─────────────────────────────────────────────────
    section_priority:
      name: "🔄 Prioritatssteuerung"
      icon: mdi:sort-variant
      collapsed: true
      input:
        priority_input_select:
          name: "Prioritats-Reihenfolge (input_select)"
          description: >
            Ein input_select Helfer dessen Optionen die Verbrauchernamen als
            kommagetrennte Liste enthalten.
          selector:
            entity:
              domain: input_select

        auto_rotate_priority:
          name: "Prioritat taglich automatisch rotieren?"
          default: true
          selector:
            boolean:

        rotation_time:
          name: "Uhrzeit der taglichen Prioritatsrotation"
          default: "00:05:00"
          selector:
            time:

    # ─────────────────────────────────────────────────
    # ABSCHNITT 5: Schwellen & Timing
    # ─────────────────────────────────────────────────
    section_thresholds:
      name: "⚙️ Schwellen & Timing"
      icon: mdi:tune
      collapsed: true
      input:
        surplus_hysteresis_on:
          name: "Einschaltschwelle Uberschuss (W)"
          description: "Uberschuss muss mindestens Gerateleistung + X W betragen zum Einschalten."
          default: 100
          selector:
            number:
              min: 0
              max: 500
              step: 50
              unit_of_measurement: "W"
              mode: slider

        surplus_hysteresis_off:
          name: "Abschaltschwelle Netzbezug (W)"
          description: "Wieviel Watt Netzbezug toleriert werden, bevor ein Verbraucher ausschaltet."
          default: 100
          selector:
            number:
              min: 0
              max: 500
              step: 50
              unit_of_measurement: "W"
              mode: slider

        # FIX: check_interval in Minuten (time_pattern seconds/{n} ist ungültig)
        check_interval:
          name: "Prüfintervall (Minuten)"
          description: "Wie oft soll die Logik ausgeführt werden? (1 = jede Minute, 5 = alle 5 Minuten)"
          default: 1
          selector:
            number:
              min: 1
              max: 30
              step: 1
              unit_of_measurement: "min"
              mode: slider

        min_on_time:
          name: "Mindest-Einschaltdauer (Sekunden)"
          description: "Ein Verbraucher bleibt mindestens diese Zeit eingeschaltet."
          default: 300
          selector:
            number:
              min: 60
              max: 1800
              step: 60
              unit_of_measurement: "s"
              mode: box

    # ─────────────────────────────────────────────────
    # ABSCHNITT 6: Verbraucher 1 (Pflicht)
    # ─────────────────────────────────────────────────
    section_consumer1:
      name: "🔌 Verbraucher 1 (Pflichtfeld)"
      icon: mdi:power-socket-de
      collapsed: false
      input:
        consumer1_switch:
          name: "Schalter Verbraucher 1"
          selector:
            entity:
              domain:
                - switch
                - input_boolean

        consumer1_name:
          name: "Name Verbraucher 1"
          description: "Muss mit der Option im input_select übereinstimmen!"
          default: "verbraucher1"
          selector:
            text:

        consumer1_power:
          name: "Leistung Verbraucher 1 (W)"
          default: 1000
          selector:
            number:
