# ═══════════════════════════════════════════════════════════════════
# TRIGGER
# FIX 1: time_pattern seconds darf kein "/N" aus einer Variable sein.
#         Wir laufen jede Minute und filtern in der Bedingung nach check_interval.
# ═══════════════════════════════════════════════════════════════════
trigger:
  - platform: time_pattern
    minutes: "/1"
    id: "check_cycle"

  - platform: time
    at: !input rotation_time
    id: "rotate_priority"

  - platform: numeric_state
    entity_id: !input battery_soc_sensor
    below: !input battery_reserve_emergency
    id: "battery_emergency"

  - platform: numeric_state
    entity_id: !input pv_power_sensor
    above: 50
    id: "pv_started"

  - platform: numeric_state
    entity_id: !input pv_power_sensor
    below: 30
    for:
      minutes: 5
    id: "pv_stopped"

# ═══════════════════════════════════════════════════════════════════
# AKTIONEN
# ═══════════════════════════════════════════════════════════════════
action:
  - choose:

    # ── FALL 1: Prioritätsrotation ──────────────────────────────────
    - conditions:
        - condition: trigger
          id: "rotate_priority"
        - condition: template
          value_template: "{{ auto_rotate_priority }}"
      sequence:
        - service: input_select.select_next
          target:
            entity_id: !input priority_input_select
        - service: persistent_notification.create
          data:
            title: "🔄 PV Priorität rotiert"
            message: "Aktuelle Priorität: {{ states(priority_input_select) }}"
            notification_id: "pv_priority_rotated"

    # ── FALL 2: Notfall → alles aus ─────────────────────────────────
    - conditions:
        - condition: trigger
          id: "battery_emergency"
      sequence:
        - service: homeassistant.turn_off
          target:
            entity_id: !input consumer1_switch
        - if:
            - condition: template
              value_template: "{{ consumer2_enabled and (consumer2_switch | string | length > 5) }}"
          then:
            - service: homeassistant.turn_off
              target:
                entity_id: !input consumer2_switch
        - if:
            - condition: template
              value_template: "{{ consumer3_enabled and (consumer3_switch | string | length > 5) }}"
          then:
            - service: homeassistant.turn_off
              target:
                entity_id: !input consumer3_switch
        - if:
            - condition: template
              value_template: "{{ consumer4_enabled and (consumer4_switch | string | length > 5) }}"
          then:
            - service: homeassistant.turn_off
              target:
                entity_id: !input consumer4_switch
        - if:
            - condition: template
              value_template: "{{ consumer5_enabled and (consumer5_switch | string | length > 5) }}"
          then:
            - service: homeassistant.turn_off
              target:
                entity_id: !input consumer5_switch
        - if:
            - condition: template
              value_template: "{{ consumer6_enabled and (consumer6_switch | string | length > 5) }}"
          then:
            - service: homeassistant.turn_off
              target:
                entity_id: !input consumer6_switch
        - service: persistent_notification.create
          data:
            title: "🔴 PV Manager: Batterie-Notfall!"
            message: >
              Batterie SoC unter Notfallschwelle ({{ battery_reserve_emergency }}%).
              Alle Verbraucher ausgeschaltet!
            notification_id: "pv_battery_emergency"

    # ── FALL 3: PV hört auf → alles aus ─────────────────────────────
    - conditions:
        - condition: trigger
          id: "pv_stopped"
      sequence:
        - service: homeassistant.turn_off
          target:
            entity_id: !input consumer1_switch
        - if:
            - condition: template
              value_template: "{{ consumer2_enabled and (consumer2_switch | string | length > 5) }}"
          then:
            - service: homeassistant.turn_off
              target:
                entity_id: !input consumer2_switch
        - if:
            - condition: template
              value_template: "{{ consumer3_enabled and (consumer3_switch | string | length > 5) }}"
          then:
            - service: homeassistant.turn_off
              target:
                entity_id: !input consumer3_switch
        - if:
            - condition: template
              value_template: "{{ consumer4_enabled and (consumer4_switch | string | length > 5) }}"
          then:
            - service: homeassistant.turn_off
              target:
                entity_id: !input consumer4_switch
        - if:
            - condition: template
              value_template: "{{ consumer5_enabled and (consumer5_switch | string | length > 5) }}"
          then:
            - service: homeassistant.turn_off
              target:
                entity_id: !input consumer5_switch
        - if:
            - condition: template
              value_template: "{{ consumer6_enabled and (consumer6_switch | string | length > 5) }}"
          then:
            - service: homeassistant.turn_off
              target:
                entity_id: !input consumer6_switch

    # ── FALL 4: Hauptsteuerungslogik ────────────────────────────────
    - conditions:
        - condition: trigger
          id:
            - "check_cycle"
            - "pv_started"
        # FIX 2: check_interval-Filter – nur alle N Minuten wirklich ausführen
        - condition: template
          value_template: >
            {{ (now().minute % (check_interval | int(1))) == 0 or
               trigger.id == 'pv_started' }}
        # Nur wenn PV aktiv
        - condition: numeric_state
          entity_id: !input pv_power_sensor
          above: 0
        # Kein Notfall
        - condition: template
          value_template: >
            {{ states(battery_soc_sensor) | float(0) > battery_reserve_emergency | float(10) }}
      sequence:
        # ── Gemeinsame Variablen berechnen ──
        - variables:
            # Aktuelle Stunde:Minute als String (HH:MM)
            hm: "{{ now().strftime('%H:%M') }}"

            # Zeitzone ermitteln (morning / noon / afternoon)
            time_zone: >-
              {% set h = now().strftime('%H:%M') %}
              {% set a = battery_prio_afternoon_hour[:5] %}
              {% set n = battery_prio_noon_hour[:5] %}
              {% set m = battery_prio_morning_hour[:5] %}
              {% if h >= a %}
                afternoon
              {% elif h >= n %}
                noon
              {% elif h >= m %}
                morning
              {% else %}
                morning
              {% endif %}

            # Batterie-Priorisierungsschwelle je Tageszeit
            batt_prio_thresh: >-
              {% set h = now().strftime('%H:%M') %}
              {% set a = battery_prio_afternoon_hour[:5] %}
              {% set n = battery_prio_noon_hour[:5] %}
              {% set m = battery_prio_morning_hour[:5] %}
              {% if h >= a %}
                {{ battery_prio_afternoon_soc | float(70) }}
              {% elif h >= n %}
                {{ battery_prio_noon_soc | float(20) }}
              {% elif h >= m %}
                {{ battery_prio_morning_soc | float(80) }}
              {% else %}
                {{ battery_prio_morning_soc | float(80) }}
              {% endif %}

            batt_soc: "{{ states(battery_soc_sensor) | float(0) }}"
            grid_w: "{{ states(grid_power_sensor) | float(0) }}"

            # Positiver Wert = Überschuss (Einspeisung ins Netz)
            surplus: "{{ [(-1 * states(grid_power_sensor) | float(0)), 0] | max }}"

            # Fehlende kWh bis Ziel
            missing_kwh: >-
              {% set cap = battery_capacity_kwh | float(10) %}
              {% set target = battery_target_soc | float(95) %}
              {% set soc = states(battery_soc_sensor) | float(0) %}
              {{ [((target - soc) / 100.0) * cap, 0] | max }}

            # Sekunden bis Sonnenuntergang
            secs_sunset: >-
              {{ [as_timestamp(state_attr('sun.sun','next_setting')) - as_timestamp(now()), 0] | max }}

            # Forecast verbleibend
            fc_rem: >-
              {% if pv_forecast_remaining | string | length > 5 and
                    states(pv_forecast_remaining) not in ['unknown','unavailable'] %}
                {{ states(pv_forecast_remaining) | float(0) }}
              {% else %}
                {{ states(pv_forecast_today) | float(0) }}
              {% endif %}

            # Muss Batterie Vorrang haben?
            batt_prio: >-
              {{ batt_soc < batt_prio_thresh or
                 (missing_kwh > 0 and secs_sunset < 10800 and fc_rem < missing_kwh * 1.2) }}

            # Mindest-SoC pro Verbraucher je Tageszeit
            c1_soc: >-
              {% set h = now().strftime('%H:%M') %}
              {% set a = battery_prio_afternoon_hour[:5] %}
              {% set n = battery_prio_noon_hour[:5] %}
              {% set m = battery_prio_morning_hour[:5] %}
              {% if h >= a %}{{ consumer1_min_soc_afternoon | float(30) }}
              {% elif h >= n %}{{ consumer1_min_soc_noon | float(10) }}
              {% else %}{{ consumer1_min_soc_morning | float(20) }}{% endif %}

            c2_soc: >-
              {% set h = now().strftime('%H:%M') %}
              {% set a = battery_prio_afternoon_hour[:5] %}
              {% set n = battery_prio_noon_hour[:5] %}
              {% set m = battery_prio_morning_hour[:5] %}
              {% if h >= a %}{{ consumer2_min_soc_afternoon | float(30) }}
              {% elif h >= n %}{{ consumer2_min_soc_noon | float(10) }}
              {% else %}{{ consumer2_min_soc_morning | float(20) }}{% endif %}

            c3_soc: >-
              {% set h = now().strftime('%H:%M') %}
              {% set a = battery_prio_afternoon_hour[:5] %}
              {% set n = battery_prio_noon_hour[:5] %}
              {% set m = battery_prio_morning_hour[:5] %}
              {% if h >= a %}{{ consumer3_min_soc_afternoon | float(30) }}
              {% elif h >= n %}{{ consumer3_min_soc_noon | float(10) }}
              {% else %}{{ consumer3_min_soc_morning | float(20) }}{% endif %}

            c4_soc: >-
              {% set h = now().strftime('%H:%M') %}
              {% set a = battery_prio_afternoon_hour[:5] %}
              {% set n = battery_prio_noon_hour[:5] %}
              {% set m = battery_prio_morning_hour[:5] %}
              {% if h >= a %}{{ consumer4_min_soc_afternoon | float(30) }}
              {% elif h >= n %}{{ consumer4_min_soc_noon | float(10) }}
              {% else %}{{ consumer4_min_soc_morning | float(20) }}{% endif %}

            c5_soc: >-
              {% set h = now().strftime('%H:%M') %}
              {% set a = battery_prio_afternoon_hour[:5] %}
              {% set n = battery_prio_noon_hour[:5] %}
              {% set m = battery_prio_morning_hour[:5] %}
              {% if h >= a %}{{ consumer5_min_soc_afternoon | float(30) }}
              {% elif h >= n %}{{ consumer5_min_soc_noon | float(10) }}
              {% else %}{{ consumer5_min_soc_morning | float(20) }}{% endif %}

            c6_soc: >-
              {% set h = now().strftime('%H:%M') %}
              {% set a = battery_prio_afternoon_hour[:5] %}
              {% set n = battery_prio_noon_hour[:5] %}
              {% set m = battery_prio_morning_hour[:5] %}
              {% if h >= a %}{{ consumer6_min_soc_afternoon | float(30) }}
              {% elif h >= n %}{{ consumer6_min_soc_noon | float(10) }}
              {% else %}{{ consumer6_min_soc_morning | float(20) }}{% endif %}

            hys_on: "{{ surplus_hysteresis_on | float(100) }}"
            hys_off: "{{ surplus_hysteresis_off | float(100) }}"

        # ── Verbraucher 1 (Pflicht) ──────────────────────────────
        - variables:
            c1_is_on: "{{ is_state(consumer1_switch, 'on') }}"
            c1_load: "{{ consumer1_power | float(0) if is_state(consumer1_switch,'on') else 0 }}"
            c1_on: >-
              {% if batt_prio %}false
              {% elif batt_soc < c1_soc %}false
              {% elif is_state(consumer1_switch,'on') %}
                {{ grid_w < hys_off }}
              {% else %}
                {{ surplus >= (consumer1_power | float(0) + hys_on) }}
              {% endif %}
        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ c1_on and not c1_is_on }}"
              sequence:
                - service: homeassistant.turn_on
                  target:
                    entity_id: !input consumer1_switch
            - conditions:
                - condition: template
                  value_template: "{{ not c1_on and c1_is_on }}"
              sequence:
                - service: homeassistant.turn_off
                  target:
                    entity_id: !input consumer1_switch

        # ── Verbraucher 2 (optional) ─────────────────────────────
        - if:
            - condition: template
              value_template: "{{ consumer2_enabled and (consumer2_switch | string | length > 5) }}"
          then:
            - variables:
                c2_is_on: "{{ is_state(consumer2_switch, 'on') }}"
                c2_surplus: "{{ surplus - c1_load }}"
                c2_on: >-
                  {% if batt_prio %}false
                  {% elif batt_soc < c2_soc %}false
                  {% elif is_state(consumer2_switch,'on') %}
                    {{ grid_w < hys_off }}
                  {% else %}
                    {{ (surplus - c1_load) >= (consumer2_power | float(0) + hys_on) }}
                  {% endif %}
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ c2_on and not c2_is_on }}"
                  sequence:
                    - service: homeassistant.turn_on
                      target:
                        entity_id: !input consumer2_switch
                - conditions:
                    - condition: template
                      value_template: "{{ not c2_on and c2_is_on }}"
                  sequence:
                    - service: homeassistant.turn_off
                      target:
                        entity_id: !input consumer2_switch

        # ── Verbraucher 3 (optional) ─────────────────────────────
        - if:
            - condition: template
              value_template: "{{ consumer3_enabled and (consumer3_switch | string | length > 5) }}"
          then:
            - variables:
                c3_is_on: "{{ is_state(consumer3_switch, 'on') }}"
                c2_load_now: "{{ consumer2_power | float(0) if (consumer2_enabled and (consumer2_switch|string|length > 5) and is_state(consumer2_switch,'on')) else 0 }}"
                c3_on: >-
                  {% if batt_prio %}false
                  {% elif batt_soc < c3_soc %}false
                  {% elif is_state(consumer3_switch,'on') %}
                    {{ grid_w < hys_off }}
                  {% else %}
                    {{ (surplus - c1_load - c2_load_now) >= (consumer3_power | float(0) + hys_on) }}
                  {% endif %}
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ c3_on and not c3_is_on }}"
                  sequence:
                    - service: homeassistant.turn_on
                      target:
                        entity_id: !input consumer3_switch
                - conditions:
                    - condition: template
                      value_template: "{{ not c3_on and c3_is_on }}"
                  sequence:
                    - service: homeassistant.turn_off
                      target:
                        entity_id: !input consumer3_switch

        # ── Verbraucher 4 (optional) ─────────────────────────────
        - if:
            - condition: template
              value_template: "{{ consumer4_enabled and (consumer4_switch | string | length > 5) }}"
          then:
            - variables:
                c4_is_on: "{{ is_state(consumer4_switch, 'on') }}"
                c2_l: "{{ consumer2_power | float(0) if (consumer2_enabled and (consumer2_switch|string|length > 5) and is_state(consumer2_switch,'on')) else 0 }}"
                c3_l: "{{ consumer3_power | float(0) if (consumer3_enabled and (consumer3_switch|string|length > 5) and is_state(consumer3_switch,'on')) else 0 }}"
                c4_on: >-
                  {% if batt_prio %}false
                  {% elif batt_soc < c4_soc %}false
                  {% elif is_state(consumer4_switch,'on') %}
                    {{ grid_w < hys_off }}
                  {% else %}
                    {{ (surplus - c1_load - c2_l - c3_l) >= (consumer4_power | float(0) + hys_on) }}
                  {% endif %}
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ c4_on and not c4_is_on }}"
                  sequence:
                    - service: homeassistant.turn_on
                      target:
                        entity_id: !input consumer4_switch
                - conditions:
                    - condition: template
                      value_template: "{{ not c4_on and c4_is_on }}"
                  sequence:
                    - service: homeassistant.turn_off
                      target:
                        entity_id: !input consumer4_switch

        # ── Verbraucher 5 (optional) ─────────────────────────────
        - if:
            - condition: template
              value_template: "{{ consumer5_enabled and (consumer5_switch | string | length > 5) }}"
          then:
            - variables:
                c5_is_on: "{{ is_state(consumer5_switch, 'on') }}"
                c2_l5: "{{ consumer2_power | float(0) if (consumer2_enabled and (consumer2_switch|string|length > 5) and is_state(consumer2_switch,'on')) else 0 }}"
                c3_l5: "{{ consumer3_power | float(0) if (consumer3_enabled and (consumer3_switch|string|length > 5) and is_state(consumer3_switch,'on')) else 0 }}"
                c4_l5: "{{ consumer4_power | float(0) if (consumer4_enabled and (consumer4_switch|string|length > 5) and is_state(consumer4_switch,'on')) else 0 }}"
                c5_on: >-
                  {% if batt_prio %}false
                  {% elif batt_soc < c5_soc %}false
                  {% elif is_state(consumer5_switch,'on') %}
                    {{ grid_w < hys_off }}
                  {% else %}
                    {{ (surplus - c1_load - c2_l5 - c3_l5 - c4_l5) >= (consumer5_power | float(0) + hys_on) }}
                  {% endif %}
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ c5_on and not c5_is_on }}"
                  sequence:
                    - service: homeassistant.turn_on
                      target:
                        entity_id: !input consumer5_switch
                - conditions:
                    - condition: template
                      value_template: "{{ not c5_on and c5_is_on }}"
                  sequence:
                    - service: homeassistant.turn_off
                      target:
                        entity_id: !input consumer5_switch

        # ── Verbraucher 6 (optional) ─────────────────────────────
        - if:
            - condition: template
              value_template: "{{ consumer6_enabled and (consumer6_switch | string | length > 5) }}"
          then:
            - variables:
                c6_is_on: "{{ is_state(consumer6_switch, 'on') }}"
                c2_l6: "{{ consumer2_power | float(0) if (consumer2_enabled and (consumer2_switch|string|length > 5) and is_state(consumer2_switch,'on')) else 0 }}"
                c3_l6: "{{ consumer3_power | float(0) if (consumer3_enabled and (consumer3_switch|string|length > 5) and is_state(consumer3_switch,'on')) else 0 }}"
                c4_l6: "{{ consumer4_power | float(0) if (consumer4_enabled and (consumer4_switch|string|length > 5) and is_state(consumer4_switch,'on')) else 0 }}"
                c5_l6: "{{ consumer5_power | float(0) if (consumer5_enabled and (consumer5_switch|string|length > 5) and is_state(consumer5_switch,'on')) else 0 }}"
                c6_on: >-
                  {% if batt_prio %}false
                  {% elif batt_soc < c6_soc %}false
                  {% elif is_state(consumer6_switch,'on') %}
                    {{ grid_w < hys_off }}
                  {% else %}
                    {{ (surplus - c1_load - c2_l6 - c3_l6 - c4_l6 - c5_l6) >= (consumer6_power | float(0) + hys_on) }}
                  {% endif %}
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ c6_on and not c6_is_on }}"
                  sequence:
                    - service: homeassistant.turn_on
                      target:
                        entity_id: !input consumer6_switch
                - conditions:
                    - condition: template
                      value_template: "{{ not c6_on and c6_is_on }}"
                  sequence:
                    - service: homeassistant.turn_off
                      target:
                        entity_id: !input consumer6_switch

mode: single
max_exceeded: silent
